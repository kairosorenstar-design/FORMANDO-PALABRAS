<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Formando Palabras · Paso 5 de 5</title>
  <meta http-equiv="X-Content-Type-Options" content="nosniff"/>
  <meta http-equiv="X-Frame-Options" content="DENY"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#080810;--surface:#12121f;--surface2:#1a1a2e;--surface3:#222238;
      --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
      --accent:#bf5fff;--accent-rgb:191,95,255;
      --text:#eeeef5;--text-2:#9898b8;--text-3:#5c5c7a;
      --f-head:'Syne',sans-serif;--f-display:'Bebas Neue',sans-serif;--f-mono:'Space Mono',monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-font-smoothing:antialiased}
    body{
      background:var(--bg);color:var(--text);
      font-family:var(--f-head);
      min-height:100vh;overflow:hidden;
      display:flex;align-items:center;justify-content:center;
    }

    /* Grid overlay */
    body::before{
      content:'';position:fixed;inset:0;
      background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);
      background-size:48px 48px;pointer-events:none;z-index:0;
    }

    /* Ambient blob única por paso */
    .blob{
      position:fixed;border-radius:50%;filter:blur(130px);
      opacity:.13;pointer-events:none;z-index:0;
      background:var(--accent);
      width:700px;height:700px;
      top:50%;left:50%;transform:translate(-50%,-50%);
      animation:pulse 4s ease-in-out infinite;
    }
    @keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.13}50%{transform:translate(-50%,-50%) scale(1.15);opacity:.18}}

    /* Inner */
    .inner{
      position:relative;z-index:1;
      display:flex;flex-direction:column;
      align-items:center;gap:2.5rem;
      width:100%;max-width:480px;
      padding:2rem;text-align:center;
    }

    /* Step bar top */
    .steps{
      display:flex;gap:.5rem;align-items:center;
    }
    .sdot{
      width:9px;height:9px;border-radius:50%;
      background:var(--surface3);border:1px solid var(--border2);
      transition:all .3s;
    }
    .sdot.done{background:rgba(var(--accent-rgb),.35);border-color:rgba(var(--accent-rgb),.5)}
    .sdot.active{background:var(--accent);border-color:var(--accent);box-shadow:0 0 10px rgba(var(--accent-rgb),.6);transform:scale(1.35)}
    .sline{width:28px;height:1px;background:var(--border2);flex-shrink:0}
    .sline.done{background:rgba(var(--accent-rgb),.4)}

    /* Number badge */
    .step-badge{
      font-family:var(--f-mono);font-size:.6rem;letter-spacing:.25em;
      text-transform:uppercase;color:var(--accent);
      background:rgba(var(--accent-rgb),.08);
      border:1px solid rgba(var(--accent-rgb),.25);
      border-radius:99px;padding:.3rem .9rem;
    }

    /* Headline */
    .headline-top{
      font-family:var(--f-mono);font-size:.62rem;letter-spacing:.3em;
      text-transform:uppercase;color:var(--text-3);margin-bottom:.5rem;
    }
    .headline-main{
      font-family:var(--f-display);
      font-size:clamp(2rem,7vw,2.8rem);
      letter-spacing:.08em;line-height:1.1;color:var(--text);
    }
    .headline-main em{color:var(--accent);font-style:normal}

    /* Ring */
    .ring-wrap{position:relative;width:180px;height:180px;flex-shrink:0}
    .ring-wrap svg{transform:rotate(-90deg)}
    .ring-track{fill:none;stroke:var(--surface3);stroke-width:5}
    .ring-fill{
      fill:none;stroke:var(--accent);stroke-width:5;
      stroke-linecap:round;stroke-dasharray:502;stroke-dashoffset:0;
      filter:drop-shadow(0 0 8px rgba(var(--accent-rgb),.65));
    }
    .ring-center{
      position:absolute;inset:0;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.1rem;
    }
    .ring-num{font-family:var(--f-display);font-size:3.8rem;color:var(--accent);line-height:1}
    .ring-unit{font-family:var(--f-mono);font-size:.6rem;color:var(--text-3);letter-spacing:.2em;text-transform:uppercase}

    /* Progress bar */
    .bar-wrap{width:100%;height:2px;background:var(--surface3);border-radius:99px;overflow:hidden}
    .bar-fill{height:100%;background:var(--accent);border-radius:99px;width:0%;box-shadow:0 0 8px rgba(var(--accent-rgb),.5)}

    /* Status */
    .status{font-family:var(--f-mono);font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-3)}

    /* Back link */
    .back-link{
      position:fixed;top:1.2rem;left:1.5rem;z-index:10;
      font-family:var(--f-mono);font-size:.65rem;color:var(--text-3);
      letter-spacing:.1em;text-decoration:none;
      display:flex;align-items:center;gap:.4rem;
      transition:color .2s;
    }
    .back-link:hover{color:var(--accent)}
    .back-link::before{content:'←'}

    /* Page title top-right */
    .page-id{
      position:fixed;top:1.2rem;right:1.5rem;z-index:10;
      font-family:var(--f-display);font-size:1.1rem;
      color:var(--accent);letter-spacing:.1em;opacity:.5;
    }

    /* Entrance animation */
    .inner{animation:fadeUp .45s cubic-bezier(.22,1,.36,1) both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>

<div class="blob"></div>
<a class="back-link" href="../index.html">Inicio</a>
<div class="page-id">FP</div>

<div class="inner">

  <!-- Dots -->
  <div class="steps" id="steps"></div>

  <!-- Badge -->
  <div class="step-badge">Paso 5 de 5</div>

  <!-- Headline -->
  <div>
    <div class="headline-top">PREPARANDO REVELADO</div>
    <div class="headline-main">Todo listo para<br/><em>revelar tu palabra</em></div>
  </div>

  <!-- Ring -->
  <div class="ring-wrap">
    <svg width="180" height="180" viewBox="0 0 180 180" aria-hidden="true">
      <circle class="ring-track" cx="90" cy="90" r="80"/>
      <circle class="ring-fill" cx="90" cy="90" r="80" id="ring"/>
    </svg>
    <div class="ring-center">
      <div class="ring-num" id="num">11</div>
      <div class="ring-unit">seg</div>
    </div>
  </div>

  <!-- Bar -->
  <div class="bar-wrap"><div class="bar-fill" id="bar"></div></div>

  <!-- Status -->
  <div class="status">preparando animación de revelado</div>

</div>

<script>
const SECS     = 11;
const STEP     = 5;
const TOTAL    = 5;
const NEXT_URL = '../index.html?reveal=1';

// Dots
(function(){
  const wrap = document.getElementById('steps');
  for(let i=1;i<=TOTAL;i++){
    const d=document.createElement('div');
    d.className='sdot'+(i<STEP?' done':i===STEP?' active':'');
    wrap.appendChild(d);
    if(i<TOTAL){
      const l=document.createElement('div');
      l.className='sline'+(i<STEP?' done':'');
      wrap.appendChild(l);
    }
  }
})();

// Guardar palabra generada si no existe
if(!sessionStorage.getItem('fp_word')){
  const L='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  sessionStorage.setItem('fp_word',[0,1,2,3].map(()=>L[Math.floor(Math.random()*26)]).join(''));
}

// Countdown
let rem = SECS;
const numEl  = document.getElementById('num');
const ringEl = document.getElementById('ring');
const barEl  = document.getElementById('bar');
const C      = 2*Math.PI*80;

numEl.textContent = rem;
ringEl.style.transition='none';
ringEl.style.strokeDashoffset='0';
barEl.style.transition='none';
barEl.style.width='0%';

requestAnimationFrame(()=>requestAnimationFrame(()=>{
  ringEl.style.transition=`stroke-dashoffset ${SECS}s linear`;
  ringEl.style.strokeDashoffset=C;
  barEl.style.transition=`width ${SECS}s linear`;
  barEl.style.width='100%';
}));

const iv=setInterval(()=>{
  rem--;
  numEl.textContent=rem;
  if(rem<=0){
    clearInterval(iv);
    window.location.href=NEXT_URL;
  }
},1000);
</script>
</body>
</html>
